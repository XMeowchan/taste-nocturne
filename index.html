<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Taste Nocturne — a moody interactive Three.js sculpture with pointer-reactive light, ripples, and cinematic bloom."
    />
    <title>Taste Nocturne</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <canvas class="webgl" aria-label="Interactive Three.js scene"></canvas>

      <div class="hud">
        <div class="hud__eyebrow">CloudAI-X / threejs-skills inspired</div>
        <h1>Taste Nocturne</h1>
        <p class="hud__copy">
          A quiet little digital sculpture: move to bend the light, drag to orbit,
          and click the core to shift its mood.
        </p>
      </div>

      <div class="panel">
        <div>
          <div class="panel__label">Mood</div>
          <div class="panel__value" id="modeName">Velvet Pulse</div>
        </div>
        <button id="modeButton" type="button">Shift mood</button>
      </div>

      <div class="footer">
        <span>move</span>
        <span>orbit</span>
        <span>click</span>
      </div>
    </div>
  </body>
</html>
